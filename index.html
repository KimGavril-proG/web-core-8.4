<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Ремонт техники различных брендов</title>
</head>
<body>
    <header class='header'>
    <h1 class='title'>Ремонт техники различных брендов</h1>
    </header>
    <main class='content'>
    <!-- Slider main container -->
    <div class="swiper">
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
            <!-- Slides -->
            <div class="swiper-slide"><img class='logo' src="./images/Bitmap.svg" alt="Lenovo"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide">Slide2</div>
            <div class="swiper-slide">Slide3</div>
            <div class="swiper-slide">Slide4</div>
            <div class="swiper-slide">Slide5</div>
            <div class="swiper-slide">Slide6</div>
            <div class="swiper-slide">Slide7</div>
            <div class="swiper-slide">Slide8</div>
            <div class="swiper-slide">Slide9</div>
            <div class="swiper-slide">Slide10</div>
            <div class="swiper-slide">Slide11</div>
        </div>

        <!-- If we need pagination -->
         <div class="swiper-pagination"></div>
    </div>
    </main>
    <script defer src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
</body>
</html>
