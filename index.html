<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Ремонт техники различных брендов</title>
</head>
<body>
    <header class='header'>
    <h1 class='title'>Ремонт техники различных брендов</h1>
    </header>
    <main class='container'>
    <!-- Slider main container -->
    <div class="swiper">
        <!-- 1. Наше неподвижное облако (вынесено из wrapper) -->
        <div class="swiper-shadow-overlay"></div>
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
            <!-- Slides -->
             <!-- 2. Двигающаяся лента со слайдами -->
            <div class="swiper-slide"><img class='logo' src="./images/Lenovo.svg" alt="Lenovo"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img src="./images/Samsung.svg" alt="Samsung"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img src="./images/Apple.svg" alt="Apple"><a class='circle-arrow' href="#"></a></div>
            <div class="swiper-slide"><img class='logo' src="./images/ViewSonic.svg" alt="ViewSonic"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img class='logo' src="./images/Bosch.svg" alt="Bosch"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img class='logo' src="./images/HP.svg" alt="HP"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img class='logo' src="./images/Acer.svg" alt="Acer"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img class='logo' src="./images/Sony.svg" alt="Sony"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img class='logo' src="./images/Lenovo.svg" alt="Lenovo"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img src="./images/Samsung.svg" alt="Samsung"><a href="#"><img class='go' src="./images/go.svg" alt="Go"></a></div>
            <div class="swiper-slide"><img src="./images/Apple.svg" alt="Apple"><a class='circle-arrow' href="#"></a></div>
        </div>

        <!-- If we need pagination -->
         <div class="swiper-pagination"></div>
         <div class="swiper-scrollbar"></div>
    </div>
    </main>
    <script defer src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
</body>
</html>
